<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Perfil Gamer</title>
 <link rel="stylesheet" href="css/bootstrap.min.css">
 <link rel="stylesheet" href="styles.css">
 <style>
  
 </style>
</head>
<body class="bg-secondary">

    <div class="container mt-4">
        <h2 class="text-center mb-4 text-danger">PERFIL GAMER</h2>
        <div class="row g-3 d-flex justify-content-center">
            <div class="col-12 col-md-5 p-3 bg-dark text-white rounded m-1">
                <div class="text-center">Nick Gamer</div> 
                <input type="text" class="form-control mb-3">
                <div class="text-center">Juego Favorito</div> 
                <input type="text" class="form-control mb-3">
                <div class="text-center">Elegi tu plataforma</div> 
                <select class="form-control mb-3">
                    <option value="choose">Elegi una opcion</option>
                    <option value="pc">PC</option>
                    <option value="mobile">Movil</option>
                    <option value="console">Consola</option>
                </select>
                <div class="text-center">Edad</div> 
                <input type="text" class="form-control mb-3">
            </div>
            <div class="col-12 col-md-5 p-3 bg-dark text-white rounded m-1">
                <div class="text-center">Horas de juego por semana</div> 
                <input type="text" class="form-control mb-3">
                <div class="text-center">Descripcion gamer</div> 
                <textarea class="form-control mb-3">

                </textarea>
                <div class="text-center">Foto de perfil</div> 
                <input class="form-control mb-3" type="file" name="image" id="a">
                <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Jugador competitivo</label>
            </div>
        </div>
        <div class="mt-3 text-center">
            <button class="btn btn-danger col-10">Crear Perfil</button>
        </div>

    </div>

</body>
</html>
